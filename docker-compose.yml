services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: southrail
      POSTGRES_USER: southrail
      POSTGRES_PASSWORD: southrail
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U southrail -d southrail"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/southrail
      DB_USERNAME: southrail
      DB_PASSWORD: southrail
      JWT_SECRET: change-me-change-me-change-me-change-me-change-me
      CORS_ALLOWED_ORIGINS: http://localhost:8088
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  postgres-data:
